<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- LeetCode Vibrant Orange Gradient to match the vividness of the reference robot -->
    <linearGradient id="lc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD166"/>
      <stop offset="40%" stop-color="#FFA116"/>
      <stop offset="100%" stop-color="#E66807"/>
    </linearGradient>
    
    <!-- Dark Visor Gradient -->
    <linearGradient id="visor-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>

    <!-- 3D Highlight for the Head -->
    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.6)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <style>
    .float { animation: floating 3s ease-in-out infinite; transform-origin: 50% 50%; }
    @keyframes floating {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
    }
    .wave { animation: waving 2s infinite; transform-origin: 75% 85%; }
    @keyframes waving {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(20deg); }
    }
  </style>

  <g class="float">
    <!-- Antenna Base (Pill Shape) -->
    <path d="M 42 22 Q 50 18 58 22 L 60 26 L 40 26 Z" fill="url(#lc-grad)"/>
    <!-- Antenna Stem -->
    <rect x="48.5" y="8" width="3" height="14" fill="#FFA116"/>
    <!-- Antenna Ball -->
    <circle cx="50" cy="6" r="4.5" fill="#FFFFFF"/>

    <!-- Small rounded Body -->
    <path d="M 35 70 C 15 75, 25 98, 50 98 C 75 98, 85 75, 65 70 Z" fill="url(#lc-grad)"/>
    
    <!-- Left Arm (Resting on side) -->
    <path d="M 32 78 C 15 80, 10 95, 25 95 C 30 95, 35 90, 35 85 Z" fill="url(#lc-grad)"/>

    <!-- Right Arm (Waving up) -->
    <g class="wave">
      <path d="M 68 78 C 85 70, 98 70, 90 90 C 85 95, 75 90, 68 85 Z" fill="url(#lc-grad)"/>
    </g>

    <!-- Large Rounded Head -->
    <rect x="12" y="24" width="76" height="56" rx="28" ry="28" fill="url(#lc-grad)"/>

    <!-- Head 3D Top Highlight -->
    <path d="M 20 32 Q 50 24 80 32 A 25 20 0 0 0 20 32 Z" fill="url(#highlight)"/>

    <!-- Dark Curved Visor -->
    <path d="M 18 48 Q 50 40 82 48 C 85 58, 75 66, 68 68 Q 50 71 32 68 C 25 66, 15 58, 18 48 Z" fill="url(#visor-grad)"/>

    <!-- Left Eye -->
    <circle cx="34" cy="54" r="8.5" fill="#FFFFFF"/>
    <circle cx="34" cy="54" r="6" fill="#0A0A0A"/>
    <!-- Left Eye Highlights -->
    <circle cx="31.5" cy="51" r="2.5" fill="#FFFFFF"/>
    <circle cx="36" cy="56" r="1" fill="#FFFFFF"/>

    <!-- Right Eye -->
    <circle cx="66" cy="54" r="8.5" fill="#FFFFFF"/>
    <circle cx="66" cy="54" r="6" fill="#0A0A0A"/>
    <!-- Right Eye Highlights -->
    <circle cx="63.5" cy="51" r="2.5" fill="#FFFFFF"/>
    <circle cx="68" cy="56" r="1" fill="#FFFFFF"/>

    <!-- Cute Smiling Mouth -->
    <path d="M 43 72 Q 50 77 57 72 L 54 75 Q 50 77 46 75 Z" fill="#FFFFFF"/>
  </g>
</svg>
